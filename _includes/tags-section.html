<section class="py-5" style="background:#f5f6f7">
  <div class="container">
    <div class="row justify-content-center text-center">
      <div class="col-12">
        <h2 class="mb-4 fw-bold" style="color:#17324d">Navegar por categoria</h2>
        <div class="d-flex flex-wrap justify-content-center mk-tags-container" style="gap:10px 8px">
          {% assign all_tags = site.tags | sort %}
          {% for tag in all_tags %}
          <a href="{{ site.baseurl }}/blog?tag={{ tag[0] | slugify }}" class="chip chip-simple chip-lg chip-primary mk-tag{% if forloop.index > 14 %} mk-tag-extra{% endif %}">
            <span class="chip-label">{{ tag[0] }}</span>
          </a>
          {% endfor %}
        </div>
        <div class="mt-4 d-flex justify-content-center" id="tags-btn-wrap">
          <button id="tags-toggle-btn" class="mk-tags-more-btn">
            <span id="tags-btn-label">Outros filtros</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
(function () {
  var extras = document.querySelectorAll('.mk-tag-extra');
  var btn    = document.getElementById('tags-toggle-btn');
  var label  = document.getElementById('tags-btn-label');
  var wrap   = document.getElementById('tags-btn-wrap');
  if (!extras.length) { wrap.style.display = 'none'; return; }
  var open = false;
  btn.addEventListener('click', function () {
    open = !open;
    extras.forEach(function (el) { el.style.display = open ? 'inline-flex' : 'none'; });
    label.textContent = open ? 'Mostrar menos' : 'Outros filtros';
  });
})();
</script>
