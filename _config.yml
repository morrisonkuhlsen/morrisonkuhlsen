#
# This file contains configuration flags to customize your site
#
environment: "production"
timezone: America/Sao_Paulo

#
# Flags below are optional
#

# Prevent site from being indexed by search engines
# Set to false to allow search engines to index the site
noindex: false

# Enter your Disqus shortname (not your username) to enable commenting on posts
# You can find your shortname on the Settings page of your Disqus account
disqus:

# Giscus comment system (powered by GitHub Discussions)
# Generate your parameters at https://giscus.app
# Steps: 1) enable Discussions on your GitHub repo
#         2) install the giscus app at https://github.com/apps/giscus
#         3) fill in the values below
giscus:
  repo: "morrisonkuhlsen/morrisonkuhlsen"
  repo_id: "R_kgDOOr6GPQ"
  category: "Announcements"
  category_id: "DIC_kwDOOr6GPc4C8poX"
  mapping: "title"
  reactions_enabled: "0"
  input_position: "top"
  theme: "noborder_light"
  lang: "pt"
  loading: "lazy"

# Enter your Google Analytics web tracking code (e.g. UA-000000000-0 or G-XXXXXXXXXX) to activate tracking
google_analytics: G-HBZB4KRNVM

# Your website URL (e.g. http://example.github.io or http://www.example.com)
# Used for Sitemap.xml and your RSS feed
url: "https://morrisonkuhlsen.com"

# If you're hosting your site at a Project repository on GitHub pages
# (http://yourusername.github.io/repository-name)
# and NOT your User repository (http://yourusername.github.io)
# then add in the baseurl here, like this: "/repository-name"
baseurl: ""

#
# !! You don't need to change any of the configuration flags below !!
#

permalink: /:title/

# The release of Jekyll Now that you're using
version: v4.3.4

# Set the Sass partials directory, as we're using @imports
sass:
  style: :compressed # You might prefer to minify using :compressed

# Use the following plug-ins
plugins:
  - jekyll-sitemap # Create a sitemap using the official Jekyll sitemap gem
  - jekyll-feed # Create an Atom feed using the official Jekyll feed gem

# Exclude these files from your production _site
exclude:
  - Gemfile
  - Gemfile.lock
  - AUTHORS
  - LICENSE
  - README.md
  - CNAME
